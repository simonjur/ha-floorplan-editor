name: Release

# Push a version tag (e.g. `git tag v0.1.1 && git push --tags`) and this
# builds dist/floorplan-card.js and publishes it as a GitHub Release asset.
# HACS installs/updates the card from that asset — no manual copying.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Publish release with the built card
        uses: softprops/action-gh-release@v2
        with:
          files: dist/floorplan-card.js
          generate_release_notes: true
